<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quenaris — Vista 3D</title>
  <link rel="stylesheet" href="app.css" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    #map { height: calc(100vh - 60px); position: relative; }
    .float { position:absolute; z-index:10; background:rgba(13,20,32,.93); backdrop-filter:blur(12px);
      border:1px solid var(--line-bright); border-radius:11px; color:var(--ink); }
    /* Panel de control (arriba-izquierda) */
    #panel { top:14px; left:14px; width:268px; padding:14px; }
    #panel .ttl { font-family:var(--font-display); font-size:14px; letter-spacing:.04em; margin-bottom:10px; }
    #panel .anal { font-family:var(--font-mono); font-size:11px; color:var(--muted); margin-bottom:12px;
      max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .seg3d { display:flex; gap:6px; margin-bottom:12px; }
    .seg3d button { flex:1; padding:8px; font-family:var(--font-mono); font-size:11px; letter-spacing:.04em;
      border:1px solid var(--line); background:var(--bg-2); color:var(--muted); border-radius:7px; cursor:pointer; }
    .seg3d button.on { background:rgba(52,211,153,.12); color:var(--green); border-color:var(--green); }
    .lab { display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--muted); margin:10px 0 5px; }
    #panel select { width:100%; padding:8px; background:var(--bg-2); color:var(--ink); border:1px solid var(--line);
      border-radius:7px; font-size:13px; }
    #panel select optgroup { color:var(--cyan); }
    #panel input[type=range] { width:100%; accent-color:var(--green); }
    .tval { font-family:var(--font-mono); font-size:12px; color:var(--cyan); }
    .note { font-family:var(--font-mono); font-size:10.5px; line-height:1.5; color:var(--faint);
      border-top:1px solid var(--line); margin-top:12px; padding-top:10px; }
    /* Leyenda (abajo-izquierda) */
    #legend { bottom:18px; left:14px; padding:12px 14px; min-width:190px; }
    #legend .lt { font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; color:var(--ink); margin-bottom:8px; }
    .ramp { height:12px; border-radius:6px; margin:4px 0 3px; }
    .ramp-ends { display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; color:var(--muted); }
    .row { display:flex; align-items:center; gap:7px; margin:3px 0; font-family:var(--font-mono); font-size:11px; }
    .sw { width:13px; height:13px; border-radius:3px; }
  </style>
</head>
<body>
  <div id="nav" data-active="3d"></div>
  <div id="map">
    <div id="panel" class="float">
      <div class="ttl">▸ Visualización</div>
      <div class="anal" id="analName">—</div>
      <div class="seg3d">
        <button id="modeZon" class="on">ZONAS</button>
        <button id="modePix">DETALLE PÍXEL</button>
      </div>
      <label class="lab" id="selLabel">Métrica</label>
      <select id="layerSelect"></select>
      <div id="pixOnly" style="display:none;">
        <label class="lab">Mes <span class="tval" id="timeLabel">—</span></label>
        <input type="range" id="timeSlider" min="0" max="0" value="0" step="1">
        <label class="lab">Opacidad</label>
        <input type="range" id="opacity" min="0" max="100" value="85">
      </div>
      <p class="note" id="modeNote"></p>
    </div>
    <div id="legend" class="float"></div>
  </div>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
  <script src="nav.js"></script>
  <script src="viewer3d.js"></script>
</body>
</html>
