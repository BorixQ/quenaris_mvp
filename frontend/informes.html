<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terranode — Informes</title>
  <link rel="stylesheet" href="app.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    .report-head { display:flex; align-items:flex-start; gap:18px; }
    .avatar { width:64px; height:64px; border-radius:14px; flex:none; color:#03110b;
      background: conic-gradient(from 140deg, var(--green), var(--cyan), var(--green));
      clip-path: polygon(50% 0,100% 28%,100% 72%,50% 100%,0 72%,0 28%);
      display:grid; place-items:center; font-family:var(--font-mono); font-weight:600; font-size:16px; }
    .meta { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:18px; }
    .meta .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .meta .v { font-family:var(--font-mono); font-weight:500; margin-top:3px; color:var(--ink); }
    .summary { background:var(--bg-1); border:1px solid var(--line-bright); border-radius:10px;
      padding:16px 18px; line-height:1.65; color:#cdd9e1; }
    .section-title { display:flex; align-items:center; gap:8px; font-family:var(--font-display);
      font-size:17px; font-weight:700; color:var(--ink); margin:28px 0 12px; letter-spacing:.02em; }
    .section-title::before { content:""; width:8px; height:8px; background:var(--green);
      box-shadow:0 0 8px var(--green); transform:rotate(45deg); }
    .toolbar { display:flex; gap:8px; }
    .picker { display:flex; gap:8px; align-items:center; margin-bottom:16px; }
    .picker select { max-width:420px; }
    .callout { padding: 16px; border-radius: 8px; margin: 16px 0; background: var(--bg-1); border-left: 4px solid var(--muted); }
    .callout.warning { border-left-color: #d9a441; background: rgba(217, 164, 65, 0.1); }
    .callout.tip { border-left-color: var(--green); background: rgba(31, 122, 61, 0.1); }
    .callout.danger { border-left-color: #b5651d; background: rgba(181, 101, 29, 0.1); }
    .callout h4 { margin: 0 0 8px 0; font-family: var(--font-display); color: var(--ink); }
    .callout p { margin: 0; line-height: 1.5; color: var(--muted); font-size: 14px; }
    .zone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-top: 16px; }
    .zone-card { background: var(--bg-0); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
    .zone-card h3 { margin: 0 0 12px 0; font-size: 15px; color: var(--ink); border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .zone-card .cause { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; margin-bottom: 12px; }
    .zone-card .cause-title { font-weight: 700; display: block; margin-bottom: 4px; color: #fff; }
    .zone-card .cause-ev { font-size: 13px; color: var(--muted); }
    .raw-vals { display: flex; gap: 12px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .page-break { page-break-before: always; }
    @media print { 
      .nav,.toolbar,.picker { display:none !important; } 
      .page-break { page-break-before: always; }
      body { background: white !important; color: black !important; }
      .container { max-width: 100% !important; padding: 0 !important; }
      .card { border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="nav" data-active="informes"></div>

  <div class="container">
    <div class="picker" id="picker"></div>
    <div id="reportRoot"></div>
  </div>

  <script src="auth.js"></script>
  <script>requireAuth();</script>
  <script src="nav.js"></script>
  <script src="informes.js"></script>
</body>
</html>
