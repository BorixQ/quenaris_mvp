server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API hacia Django (mismo origen => sin problemas CORS en prod)
    location /api/ {
        proxy_pass http://web:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://web:8000/admin/;
        proxy_set_header Host $host;
    }

    # Proxy para archivos estáticos del admin de Django
    location /static/ {
        proxy_pass http://web:8000/static/;
        proxy_set_header Host $host;
    }

    # Media (rásters de mapa de calor, ortomosaicos) servido directo desde el volumen.
    location /media/ {
        alias /srv/media/;
        expires 7d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
